<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SUPREMACY 1942</title>
  <style>
    body {
      margin: 0;
      background: #050505;
      color: #f0d28a;
      font-family: Georgia, serif;
    }

    header {
      background: #0b0b0b;
      padding: 18px;
      border-bottom: 2px solid #333;
    }

    h1 {
      margin: 0;
      font-size: 42px;
      letter-spacing: 2px;
    }

    .topbar {
      margin-top: 10px;
      display: flex;
      gap: 20px;
      font-size: 18px;
      flex-wrap: wrap;
    }

    .layout {
      display: flex;
      min-height: calc(100vh - 100px);
    }

    .map-area {
      position: relative;
      flex: 1;
      background: #0b2347;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 650px;
    }

    .map-background {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 1;
      background: #0b2347;
    }

    .map-overlay {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      max-width: 1000px;
      max-height: 700px;
    }

    .side-panel {
      width: 340px;
      background: #090909;
      border-left: 2px solid #333;
      padding: 18px;
      box-sizing: border-box;
    }

    .panel-box {
      border: 1px solid #5a4720;
      padding: 15px;
      margin-bottom: 16px;
      background: rgba(0, 0, 0, 0.45);
    }

    .panel-box h2 {
      margin: 0 0 12px 0;
      font-size: 22px;
      color: #f0d28a;
    }

    .country-line {
      margin: 8px 0;
      font-size: 18px;
    }

    #selected-country,
    #selected-army {
      font-size: 22px;
      color: white;
      font-weight: bold;
    }

    #selected-info,
    #selected-army-info {
      margin-top: 10px;
      color: #ddd;
      line-height: 1.5;
      font-size: 16px;
    }

    .country-zone {
      fill: rgba(255, 255, 255, 0.02);
      stroke: rgba(0, 0, 0, 0.15);
      stroke-width: 2;
      cursor: pointer;
      transition: 0.2s;
    }

    .country-zone:hover {
      fill: rgba(240, 210, 138, 0.18);
      stroke: #f0d28a;
      stroke-width: 3;
    }

    .country-zone.selected {
      fill: rgba(255, 255, 255, 0.08);
      stroke: #ffffff;
      stroke-width: 4;
    }

    .province {
      stroke: rgba(0, 0, 0, 0.6);
      stroke-width: 2;
      stroke-dasharray: 4 4;
      fill: none;
      pointer-events: none;
    }

    .city {
      fill: #f0d28a;
      stroke: #111;
      stroke-width: 2;
      pointer-events: none;
    }

    .label {
      fill: white;
      font-size: 16px;
      font-weight: bold;
      text-anchor: middle;
      pointer-events: auto;
      cursor: pointer;
      paint-order: stroke;
      stroke: rgba(0, 0, 0, 0.55);
      stroke-width: 3px;
    }

    .small-label {
      fill: #f0d28a;
      font-size: 12px;
      text-anchor: middle;
      pointer-events: none;
      paint-order: stroke;
      stroke: rgba(0, 0, 0, 0.55);
      stroke-width: 2px;
    }

    .army {
      fill: #f0d28a;
      stroke: #111;
      stroke-width: 2;
      cursor: pointer;
      transition: 0.2s;
    }

    .army:hover {
      fill: white;
      transform: scale(1.08);
    }

    .army.selected {
      fill: #ffffff;
      stroke: #f0d28a;
      stroke-width: 3;
    }

    .army-label {
      fill: black;
      font-size: 13px;
      font-weight: bold;
      text-anchor: middle;
      pointer-events: none;
    }

    .action-button {
      margin-top: 14px;
      width: 100%;
      padding: 10px;
      background: #f0d28a;
      color: #111;
      border: none;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
      transition: 0.2s;
    }

    .action-button:hover {
      background: #fff;
    }

    .action-button:disabled {
      background: #7a6a45;
      color: #222;
      cursor: not-allowed;
    }

    @media (max-width: 900px) {
      .layout {
        flex-direction: column;
      }

      .side-panel {
        width: 100%;
        border-left: none;
        border-top: 2px solid #333;
      }

      .map-area {
        min-height: 500px;
      }

      h1 {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>SUPREMACY 1942</h1>
    <div class="topbar">
      <div>⚙️ 90</div>
      <div>⛽ 70</div>
      <div>🌾 80</div>
      <div>💰 600</div>
    </div>
  </header>

  <div class="layout">
    <div class="map-area">
      <img src="IMG_7338.jpeg" alt="Carte de l'Europe" class="map-background" />

      <svg class="map-overlay" viewBox="0 0 1000 700" preserveAspectRatio="xMidYMid meet">
        <!-- ROYAUME-UNI -->
        <polygon
          id="uk"
          class="country-zone"
          points="
            88,170
            148,142
            175,170
            173,228
            138,258
            93,228
            82,190
          "
        />

        <!-- ESPAGNE -->
        <polygon
          id="spain"
          class="country-zone"
          points="
            55,450
            140,430
            210,452
            196,523
            110,542
            48,492
          "
        />

        <!-- FRANCE -->
        <polygon
          id="france"
          class="country-zone"
          points="
            170,310
            220,275
            300,260
            360,295
            350,350
            300,390
            230,400
            180,360
          "
        />

        <!-- ALLEMAGNE -->
        <polygon
          id="germany"
          class="country-zone"
          points="
            360,250
            430,230
            520,260
            520,340
            460,380
            380,360
            340,300
          "
        />

        <!-- ITALIE -->
        <polygon
          id="italy"
          class="country-zone"
          points="
            430,430
            505,405
            545,450
            535,595
            490,625
            450,555
            430,505
          "
        />

        <!-- POLOGNE -->
        <polygon
          id="poland"
          class="country-zone"
          points="
            545,265
            640,250
            690,285
            675,360
            590,360
            530,315
          "
        />

        <!-- URSS -->
        <polygon
          id="ussr"
          class="country-zone"
          points="
            705,140
            965,110
            980,325
            920,500
            720,470
            670,270
          "
        />

        <!-- FRONTIÈRES DE PROVINCES -->
        <line class="province" x1="250" y1="285" x2="285" y2="390" />
        <line class="province" x1="430" y1="240" x2="450" y2="365" />
        <line class="province" x1="610" y1="265" x2="600" y2="360" />

        <!-- CAPITALES MIEUX REPLACÉES -->
        <circle class="city" cx="120" cy="235" r="8" />
        <circle class="city" cx="245" cy="375" r="8" />
        <circle class="city" cx="110" cy="535" r="8" />
        <circle class="city" cx="445" cy="355" r="8" />
        <circle class="city" cx="500" cy="535" r="8" />
        <circle class="city" cx="640" cy="365" r="8" />
        <circle class="city" cx="905" cy="255" r="8" />

        <!-- NOMS CLIQUABLES -->
        <text class="label" x="120" y="223" data-country="uk">Londres</text>
        <text class="label" x="245" y="363" data-country="france">Paris</text>
        <text class="label" x="110" y="523" data-country="spain">Madrid</text>
        <text class="label" x="445" y="343" data-country="germany">Berlin</text>
        <text class="label" x="500" y="523" data-country="italy">Rome</text>
        <text class="label" x="640" y="353" data-country="poland">Varsovie</text>
        <text class="label" x="905" y="243" data-country="ussr">Moscou</text>

        <text class="small-label" x="445" y="380">Allemagne</text>
        <text class="small-label" x="245" y="400">France</text>
        <text class="small-label" x="640" y="390">Pologne</text>

        <!-- ARMÉES MIEUX REPLACÉES -->
        <circle id="army-germany" class="army" cx="455" cy="395" r="14" />
        <text id="army-label-germany" class="army-label" x="455" y="400">12</text>

        <circle id="army-france" class="army" cx="270" cy="430" r="14" />
        <text id="army-label-france" class="army-label" x="270" y="435">8</text>

        <circle id="army-ussr" class="army" cx="870" cy="305" r="14" />
        <text id="army-label-ussr" class="army-label" x="870" y="310">20</text>
      </svg>
    </div>

    <div class="side-panel">
      <div class="panel-box">
        <h2>Situation</h2>
        <div class="country-line">🇩🇪 Allemagne</div>
        <div class="country-line">🇬🇧 Royaume-Uni</div>
        <div class="country-line">🇫🇷 France</div>
        <div class="country-line">🇷🇺 URSS</div>
        <div class="country-line">🇮🇹 Italie</div>
        <div class="country-line">🇪🇸 Espagne</div>
        <div class="country-line">🇵🇱 Pologne</div>
      </div>

      <div class="panel-box">
        <h2>Pays sélectionné</h2>
        <div id="selected-country">Aucun</div>
        <div id="selected-info">Clique sur un pays de la carte.</div>
        <button id="recruit-button" class="action-button" disabled>Recruter +1 division</button>
      </div>

      <div class="panel-box">
        <h2>Armée sélectionnée</h2>
        <div id="selected-army">Aucune</div>
        <div id="selected-army-info">Clique sur une armée.</div>
      </div>

      <div class="panel-box">
        <h2>Journal</h2>
        <div id="journal-log">1 Sept. 1939 — La guerre commence !</div>
      </div>
    </div>
  </div>

  <script>
    const countryData = {
      uk: {
        name: "Royaume-Uni",
        capital: "Londres",
        region: "Angleterre",
        resource: "argent",
        armies: 4,
        money: 120,
        armyId: null
      },
      france: {
        name: "France",
        capital: "Paris",
        region: "Île-de-France",
        resource: "nourriture",
        armies: 8,
        money: 140,
        armyId: "army-france"
      },
      spain: {
        name: "Espagne",
        capital: "Madrid",
        region: "Castille",
        resource: "nourriture",
        armies: 2,
        money: 90,
        armyId: null
      },
      germany: {
        name: "Allemagne",
        capital: "Berlin",
        region: "Prusse",
        resource: "industrie",
        armies: 12,
        money: 160,
        armyId: "army-germany"
      },
      italy: {
        name: "Italie",
        capital: "Rome",
        region: "Latium",
        resource: "argent",
        armies: 10,
        money: 110,
        armyId: null
      },
      poland: {
        name: "Pologne",
        capital: "Varsovie",
        region: "Mazovie",
        resource: "nourriture",
        armies: 1,
        money: 70,
        armyId: null
      },
      ussr: {
        name: "URSS",
        capital: "Moscou",
        region: "Russie centrale",
        resource: "pétrole",
        armies: 20,
        money: 220,
        armyId: "army-ussr"
      }
    };

    const armyData = {
      "army-germany": {
        name: "Armée allemande",
        countryId: "germany",
        position: "Berlin (Prusse)",
        type: "Infanterie",
        force: 12,
        attack: 10,
        defense: 8
      },
      "army-france": {
        name: "Armée française",
        countryId: "france",
        position: "Paris (Île-de-France)",
        type: "Infanterie",
        force: 8,
        attack: 8,
        defense: 9
      },
      "army-ussr": {
        name: "Armée soviétique",
        countryId: "ussr",
        position: "Moscou (Russie centrale)",
        type: "Infanterie",
        force: 20,
        attack: 11,
        defense: 10
      }
    };

    const zones = document.querySelectorAll(".country-zone");
    const armies = document.querySelectorAll(".army");
    const labels = document.querySelectorAll(".label[data-country]");
    const mapOverlay = document.querySelector(".map-overlay");

    const selectedCountry = document.getElementById("selected-country");
    const selectedInfo = document.getElementById("selected-info");
    const selectedArmy = document.getElementById("selected-army");
    const selectedArmyInfo = document.getElementById("selected-army-info");
    const recruitButton = document.getElementById("recruit-button");
    const journalLog = document.getElementById("journal-log");

    let currentCountryId = null;
    let currentArmyId = null;

    function renderCountryInfo(id) {
      const country = countryData[id];
      selectedCountry.textContent = country.name;
      selectedInfo.innerHTML = `
        Capitale : ${country.capital}<br>
        Région : ${country.region}<br>
        Ressource : ${country.resource}<br>
        Armées : ${country.armies} divisions<br>
        Trésor : ${country.money}
      `;
      currentCountryId = id;
      recruitButton.disabled = false;
    }

    function renderArmyInfo(id) {
      const army = armyData[id];
      selectedArmy.textContent = army.name;
      selectedArmyInfo.innerHTML = `
        Position : ${army.position}<br>
        Type : ${army.type}<br>
        Force : ${army.force} divisions<br>
        Attaque : ${army.attack}<br>
        Défense : ${army.defense}
      `;
      currentArmyId = id;
    }

    function clearSelection() {
      zones.forEach(z => z.classList.remove("selected"));
      armies.forEach(a => a.classList.remove("selected"));

      selectedCountry.textContent = "Aucun";
      selectedInfo.innerHTML = "Clique sur un pays de la carte.";

      selectedArmy.textContent = "Aucune";
      selectedArmyInfo.innerHTML = "Clique sur une armée.";

      recruitButton.disabled = true;

      currentCountryId = null;
      currentArmyId = null;
    }

    function selectCountry(id) {
      zones.forEach(z => z.classList.remove("selected"));
      const zone = document.getElementById(id);
      if (zone) zone.classList.add("selected");

      renderCountryInfo(id);
    }

    function selectArmy(id) {
      armies.forEach(a => a.classList.remove("selected"));
      const army = document.getElementById(id);
      if (army) army.classList.add("selected");

      renderArmyInfo(id);

      const linkedCountryId = armyData[id].countryId;
      selectCountry(linkedCountryId);
    }

    function updateArmyVisual(countryId) {
      const country = countryData[countryId];
      if (!country.armyId) return;

      const army = armyData[country.armyId];
      army.force = country.armies;

      const shortId = country.armyId.replace("army-", "");
      const label = document.getElementById(`army-label-${shortId}`);
      if (label) {
        label.textContent = country.armies;
      }

      if (currentArmyId === country.armyId) {
        renderArmyInfo(country.armyId);
      }
    }

    zones.forEach(zone => {
      zone.addEventListener("click", (event) => {
        event.stopPropagation();
        selectCountry(zone.id);
      });
    });

    armies.forEach(army => {
      army.addEventListener("click", (event) => {
        event.stopPropagation();
        selectArmy(army.id);
      });
    });

    labels.forEach(label => {
      label.addEventListener("click", (event) => {
        event.stopPropagation();
        const id = label.dataset.country;
        selectCountry(id);
      });
    });

    mapOverlay.addEventListener("click", () => {
      clearSelection();
    });

    recruitButton.addEventListener("click", () => {
      if (!currentCountryId) return;

      const country = countryData[currentCountryId];
      country.armies += 1;
      country.money = Math.max(0, country.money - 10);

      renderCountryInfo(currentCountryId);
      updateArmyVisual(currentCountryId);

      journalLog.innerHTML = `1 Sept. 1939 — ${country.name} recrute +1 division à ${country.capital}.`;
    });
  </script>
</body>
</html>
