<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SUPREMACY 1942</title>
  <style>
    body {
      margin: 0;
      background: #050505;
      color: #f0d28a;
      font-family: Georgia, serif;
    }

    header {
      background: #0b0b0b;
      padding: 18px;
      border-bottom: 2px solid #333;
    }

    h1 {
      margin: 0;
      font-size: 42px;
      letter-spacing: 2px;
    }

    .topbar {
      margin-top: 10px;
      display: flex;
      gap: 20px;
      font-size: 18px;
      flex-wrap: wrap;
    }

    .layout {
      display: flex;
      min-height: calc(100vh - 100px);
    }

    .map-area {
      position: relative;
      flex: 1;
      background: #0b2347;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 650px;
    }

    .map-background {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 1;
      background: #0b2347;
    }

    .map-overlay {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      max-width: 1000px;
      max-height: 700px;
    }

    .side-panel {
      width: 340px;
      background: #090909;
      border-left: 2px solid #333;
      padding: 18px;
      box-sizing: border-box;
    }

    .panel-box {
      border: 1px solid #5a4720;
      padding: 15px;
      margin-bottom: 16px;
      background: rgba(0, 0, 0, 0.45);
    }

    .panel-box h2 {
      margin: 0 0 12px 0;
      font-size: 22px;
      color: #f0d28a;
    }

    .country-line {
      margin: 8px 0;
      font-size: 18px;
    }

    #selected-country,
    #selected-army {
      font-size: 22px;
      color: white;
      font-weight: bold;
    }

    #selected-info,
    #selected-army-info {
      margin-top: 10px;
      color: #ddd;
      line-height: 1.5;
      font-size: 16px;
    }

    .country-zone {
      fill: rgba(255, 255, 255, 0.02);
      stroke: rgba(0, 0, 0, 0.15);
      stroke-width: 2;
      cursor: pointer;
      transition: 0.2s;
    }

    .country-zone:hover {
      fill: rgba(240, 210, 138, 0.18);
      stroke: #f0d28a;
      stroke-width: 3;
    }

    .country-zone.selected {
      fill: rgba(255, 255, 255, 0.08);
      stroke: #ffffff;
      stroke-width: 4;
    }

    .province {
      stroke: rgba(0, 0, 0, 0.6);
      stroke-width: 2;
      stroke-dasharray: 4 4;
      fill: none;
      pointer-events: none;
    }

    .city {
      fill: #f0d28a;
      stroke: #111;
      stroke-width: 2;
      pointer-events: none;
    }

    .label {
      fill: white;
      font-size: 16px;
      font-weight: bold;
      text-anchor: middle;
      pointer-events: none;
      paint-order: stroke;
      stroke: rgba(0, 0, 0, 0.55);
      stroke-width: 3px;
    }

    .small-label {
      fill: #f0d28a;
      font-size: 12px;
      text-anchor: middle;
      pointer-events: none;
      paint-order: stroke;
      stroke: rgba(0, 0, 0, 0.55);
      stroke-width: 2px;
    }

    .army {
      fill: #f0d28a;
      stroke: #111;
      stroke-width: 2;
      cursor: pointer;
      transition: 0.2s;
    }

    .army:hover {
      fill: white;
      transform: scale(1.08);
    }

    .army.selected {
      fill: #ffffff;
      stroke: #f0d28a;
      stroke-width: 3;
    }

    .army-label {
      fill: black;
      font-size: 13px;
      font-weight: bold;
      text-anchor: middle;
      pointer-events: none;
    }

    @media (max-width: 900px) {
      .layout {
        flex-direction: column;
      }

      .side-panel {
        width: 100%;
        border-left: none;
        border-top: 2px solid #333;
      }

      .map-area {
        min-height: 500px;
      }

      h1 {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>SUPREMACY 1942</h1>
    <div class="topbar">
      <div>⚙️ 90</div>
      <div>⛽ 70</div>
      <div>🌾 80</div>
      <div>💰 600</div>
    </div>
  </header>

  <div class="layout">
    <div class="map-area">
      <img src="IMG_7338.jpeg" alt="Carte de l'Europe" class="map-background" />

      <svg class="map-overlay" viewBox="0 0 1000 700" preserveAspectRatio="xMidYMid meet">
        <!-- ROYAUME-UNI -->
        <polygon
          id="uk"
          class="country-zone"
          points="
            88,170
            148,142
            175,170
            173,228
            138,258
            93,228
            82,190
          "
        />

        <!-- ESPAGNE -->
        <polygon
          id="spain"
          class="country-zone"
          points="
            55,450
            140,430
            210,452
            196,523
            110,542
            48,492
          "
        />

        <!-- FRANCE (mieux alignée) -->
        <polygon
          id="france"
          class="country-zone"
          points="
            170,310
            220,275
            300,260
            360,295
            350,350
            300,390
            230,400
            180,360
          "
        />

        <!-- ALLEMAGNE (mieux alignée) -->
        <polygon
          id="germany"
          class="country-zone"
          points="
            360,250
            430,230
            520,260
            520,340
            460,380
            380,360
            340,300
          "
        />

        <!-- ITALIE -->
        <polygon
          id="italy"
          class="country-zone"
          points="
            430,430
            505,405
            545,450
            535,595
            490,625
            450,555
            430,505
          "
        />

        <!-- POLOGNE -->
        <polygon
          id="poland"
          class="country-zone"
          points="
            545,265
            640,250
            690,285
            675,360
            590,360
            530,315
          "
        />

        <!-- URSS -->
        <polygon
          id="ussr"
          class="country-zone"
          points="
            705,140
            965,110
            980,325
            920,500
            720,470
            670,270
          "
        />

        <!-- FRONTIÈRES DE PROVINCES -->
        <line class="province" x1="250" y1="285" x2="285" y2="390" />
        <line class="province" x1="430" y1="240" x2="450" y2="365" />
        <line class="province" x1="610" y1="265" x2="600" y2="360" />

        <!-- CAPITALES -->
        <circle class="city" cx="135" cy="195" r="8" />
        <circle class="city" cx="235" cy="335" r="8" />
        <circle class="city" cx="138" cy="493" r="8" />
        <circle class="city" cx="435" cy="315" r="8" />
        <circle class="city" cx="490" cy="470" r="8" />
        <circle class="city" cx="610" cy="305" r="8" />
        <circle class="city" cx="850" cy="215" r="8" />

        <!-- NOMS -->
        <text class="label" x="135" y="183">Londres</text>
        <text class="label" x="235" y="323">Paris</text>
        <text class="label" x="138" y="481">Madrid</text>
        <text class="label" x="435" y="303">Berlin</text>
        <text class="label" x="490" y="458">Rome</text>
        <text class="label" x="610" y="293">Varsovie</text>
        <text class="label" x="850" y="203">Moscou</text>

        <text class="small-label" x="435" y="340">Allemagne</text>
        <text class="small-label" x="235" y="360">France</text>
        <text class="small-label" x="610" y="330">Pologne</text>

        <!-- ARMÉES -->
        <circle id="army-germany" class="army" cx="445" cy="355" r="14" />
        <text class="army-label" x="445" y="360">12</text>

        <circle id="army-france" class="army" cx="255" cy="385" r="14" />
        <text class="army-label" x="255" y="390">8</text>

        <circle id="army-ussr" class="army" cx="820" cy="255" r="14" />
        <text class="army-label" x="820" y="260">20</text>
      </svg>
    </div>

    <div class="side-panel">
      <div class="panel-box">
        <h2>Situation</h2>
        <div class="country-line">🇩🇪 Allemagne</div>
        <div class="country-line">🇬🇧 Royaume-Uni</div>
        <div class="country-line">🇫🇷 France</div>
        <div class="country-line">🇷🇺 URSS</div>
        <div class="country-line">🇮🇹 Italie</div>
        <div class="country-line">🇪🇸 Espagne</div>
        <div class="country-line">🇵🇱 Pologne</div>
      </div>

      <div class="panel-box">
        <h2>Pays sélectionné</h2>
        <div id="selected-country">Aucun</div>
        <div id="selected-info">Clique sur un pays de la carte.</div>
      </div>

      <div class="panel-box">
        <h2>Armée sélectionnée</h2>
        <div id="selected-army">Aucune</div>
        <div id="selected-army-info">Clique sur une armée.</div>
      </div>

      <div class="panel-box">
        <h2>Journal</h2>
        <div>1 Sept. 1939 — La guerre commence !</div>
      </div>
    </div>
  </div>

  <script>
    const countryData = {
      uk: {
        name: "Royaume-Uni",
        info: "Capitale : Londres<br>Région : Angleterre<br>Ressource : argent<br>Armées : 4 divisions"
      },
      france: {
        name: "France",
        info: "Capitale : Paris<br>Région : Île-de-France<br>Ressource : nourriture<br>Armées : 8 divisions"
      },
      spain: {
        name: "Espagne",
        info: "Capitale : Madrid<br>Région : Castille<br>Ressource : nourriture<br>Armées : 2 divisions"
      },
      germany: {
        name: "Allemagne",
        info: "Capitale : Berlin<br>Région : Prusse<br>Ressource : industrie<br>Armées : 12 divisions"
      },
      italy: {
        name: "Italie",
        info: "Capitale : Rome<br>Région : Latium<br>Ressource : argent<br>Armées : 10 divisions"
      },
      poland: {
        name: "Pologne",
        info: "Capitale : Varsovie<br>Région : Mazovie<br>Ressource : nourriture<br>Armées : 1 division"
      },
      ussr: {
        name: "URSS",
        info: "Capitale : Moscou<br>Région : Russie centrale<br>Ressource : pétrole<br>Armées : 20 divisions"
      }
    };

    const armyData = {
      "army-germany": {
        name: "Armée allemande",
        info: "Position : Berlin (Prusse)<br>Type : Infanterie<br>Force : 12 divisions<br>Attaque : 10<br>Défense : 8"
      },
      "army-france": {
        name: "Armée française",
        info: "Position : Paris (Île-de-France)<br>Type : Infanterie<br>Force : 8 divisions<br>Attaque : 8<br>Défense : 9"
      },
      "army-ussr": {
        name: "Armée soviétique",
        info: "Position : Moscou (Russie centrale)<br>Type : Infanterie<br>Force : 20 divisions<br>Attaque : 11<br>Défense : 10"
      }
    };

    const zones = document.querySelectorAll(".country-zone");
    const armies = document.querySelectorAll(".army");

    const selectedCountry = document.getElementById("selected-country");
    const selectedInfo = document.getElementById("selected-info");

    const selectedArmy = document.getElementById("selected-army");
    const selectedArmyInfo = document.getElementById("selected-army-info");

    zones.forEach(zone => {
      zone.addEventListener("click", () => {
        zones.forEach(z => z.classList.remove("selected"));
        zone.classList.add("selected");

        const id = zone.id;
        selectedCountry.textContent = countryData[id].name;
        selectedInfo.innerHTML = countryData[id].info;
      });
    });

    armies.forEach(army => {
      army.addEventListener("click", (event) => {
        event.stopPropagation();

        armies.forEach(a => a.classList.remove("selected"));
        army.classList.add("selected");

        const id = army.id;
        selectedArmy.textContent = armyData[id].name;
        selectedArmyInfo.innerHTML = armyData[id].info;
      });
    });
  </script>
</body>
</html>
