<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SUPREMACY 1942</title>

<style>

body{
margin:0;
background:#050505;
color:#f0d28a;
font-family:Georgia,serif;
}

header{
background:#0b0b0b;
padding:20px;
border-bottom:2px solid #333;
}

h1{
margin:0;
font-size:40px;
}

.topbar{
margin-top:10px;
display:flex;
gap:20px;
font-size:18px;
}

.layout{
display:flex;
height:100vh;
}

.map-area{
flex:1;
background:#0b2347;
display:flex;
justify-content:center;
align-items:center;
}

.side-panel{
width:320px;
background:#090909;
border-left:2px solid #333;
padding:20px;
}

.panel-box{
border:1px solid #5a4720;
padding:15px;
margin-bottom:15px;
}

.panel-box h2{
margin-top:0;
}

#selected-country{
font-size:22px;
color:white;
}

/* PAYS */

.country{
stroke:#0d0d0d;
stroke-width:4;
stroke-linejoin:round;
cursor:pointer;
transition:0.2s;
}

.country:hover{
stroke:#f0d28a;
stroke-width:5;
}

.country.selected{
stroke:white;
stroke-width:6;
}

/* PROVINCES */

.province{
stroke:#1a1a1a;
stroke-width:2;
stroke-dasharray:4 4;
}

/* CAPITALES */

.city{
fill:#f0d28a;
stroke:#111;
stroke-width:2;
}

.label{
fill:white;
font-size:18px;
text-anchor:middle;
}

</style>
</head>

<body>

<header>

<h1>SUPREMACY 1942</h1>

<div class="topbar">
<div>⚙️ 90</div>
<div>⛽ 70</div>
<div>🌾 80</div>
<div>💰 600</div>
</div>

</header>

<div class="layout">

<div class="map-area">

<svg width="900" height="600">

<!-- Royaume-Uni -->

<polygon id="uk" class="country" fill="#9b2f2f"
points="140,140 190,110 230,140 220,220 170,260 120,230"></polygon>

<!-- France -->

<polygon id="france" class="country" fill="#3d57b8"
points="200,300 300,250 380,280 360,380 260,410 180,360"></polygon>

<!-- Espagne -->

<polygon id="spain" class="country" fill="#9c6b2f"
points="120,420 210,400 260,440 240,520 140,540 90,480"></polygon>

<!-- Allemagne -->

<polygon id="germany" class="country" fill="#777777"
points="380,240 480,220 540,270 520,360 430,380 360,310"></polygon>

<!-- Italie -->

<polygon id="italy" class="country" fill="#2d7e41"
points="420,420 500,400 550,440 540,580 480,610 440,540"></polygon>

<!-- Pologne -->

<polygon id="poland" class="country" fill="#b44a4a"
points="540,250 650,230 700,270 680,360 580,350 530,300"></polygon>

<!-- URSS -->

<polygon id="ussr" class="country" fill="#7a2626"
points="700,120 880,100 900,300 830,450 700,430 660,260"></polygon>

<!-- PROVINCES -->

<line class="province" x1="260" y1="270" x2="300" y2="380"></line>
<line class="province" x1="440" y1="250" x2="450" y2="360"></line>
<line class="province" x1="610" y1="250" x2="600" y2="350"></line>

<!-- CAPITALES -->

<circle class="city" cx="180" cy="180" r="7"></circle>
<circle class="city" cx="250" cy="320" r="7"></circle>
<circle class="city" cx="180" cy="480" r="7"></circle>
<circle class="city" cx="450" cy="300" r="7"></circle>
<circle class="city" cx="490" cy="460" r="7"></circle>
<circle class="city" cx="620" cy="290" r="7"></circle>
<circle class="city" cx="800" cy="200" r="7"></circle>

<!-- NOMS -->

<text class="label" x="180" y="170">Londres</text>
<text class="label" x="250" y="310">Paris</text>
<text class="label" x="180" y="470">Madrid</text>
<text class="label" x="450" y="290">Berlin</text>
<text class="label" x="490" y="450">Rome</text>
<text class="label" x="620" y="280">Varsovie</text>
<text class="label" x="800" y="190">Moscou</text>

</svg>

</div>

<div class="side-panel">

<div class="panel-box">
<h2>Situation</h2>

🇩🇪 Allemagne<br>
🇬🇧 Royaume-Uni<br>
🇫🇷 France<br>
🇷🇺 URSS<br>
🇮🇹 Italie<br>
🇪🇸 Espagne<br>
🇵🇱 Pologne

</div>

<div class="panel-box">

<h2>Pays sélectionné</h2>

<div id="selected-country">Aucun</div>

</div>

<div class="panel-box">

<h2>Journal</h2>

1 Sept. 1939 — La guerre commence !

</div>

</div>

</div>

<script>

const names={
uk:"Royaume-Uni",
france:"France",
spain:"Espagne",
germany:"Allemagne",
italy:"Italie",
poland:"Pologne",
ussr:"URSS"
}

const countries=document.querySelectorAll(".country")

countries.forEach(country=>{

country.addEventListener("click",()=>{

countries.forEach(c=>c.classList.remove("selected"))

country.classList.add("selected")

document.getElementById("selected-country").textContent=names[country.id]

})

})

</script>

</body>
</html>
