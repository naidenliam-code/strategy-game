<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supremacy 1942</title>
  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      color: #f0d28a;
      font-family: Georgia, serif;
    }

    header {
      background: #121212;
      padding: 15px;
      border-bottom: 1px solid #444;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      letter-spacing: 2px;
    }

    .topbar {
      display: flex;
      gap: 20px;
      margin-top: 10px;
      font-size: 18px;
    }

    .layout {
      display: flex;
      min-height: calc(100vh - 90px);
    }

    .map-area {
      flex: 1;
      padding: 20px;
      background: linear-gradient(#0a1830, #08111f);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .side-panel {
      width: 300px;
      background: #111;
      border-left: 1px solid #333;
      padding: 20px;
    }

    .panel-box {
      border: 1px solid #3a2d12;
      background: #0e0e0e;
      padding: 15px;
      margin-bottom: 20px;
    }

    .panel-box h3 {
      margin-top: 0;
      color: #e6c26a;
    }

    .country {
      margin: 8px 0;
      font-size: 18px;
    }

    svg {
      max-width: 100%;
      height: auto;
    }

    .country-shape {
      stroke: #222;
      stroke-width: 2;
      cursor: pointer;
      transition: 0.2s;
    }

    .country-shape:hover {
      filter: brightness(1.15);
      stroke: #f0d28a;
    }

    .label {
      fill: white;
      font-size: 18px;
      font-weight: bold;
      text-anchor: middle;
      pointer-events: none;
    }

    .city {
      fill: #f0d28a;
      stroke: #222;
      stroke-width: 2;
    }

    .journal {
      font-size: 16px;
      line-height: 1.5;
    }

    #selected-country {
      color: #fff;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <h1>SUPREMACY 1942</h1>
    <div class="topbar">
      <div>⚙️ 90</div>
      <div>⛽ 70</div>
      <div>🌾 80</div>
      <div>💰 600</div>
    </div>
  </header>

  <div class="layout">
    <div class="map-area">
      <svg viewBox="0 0 900 600" aria-label="Carte de l'Europe">
        <!-- Mer -->
        <rect x="0" y="0" width="900" height="600" fill="#0b2244"></rect>

        <!-- Pays simplifiés -->
        <polygon class="country-shape" id="uk" points="120,120 180,100 220,150 210,220 150,240 110,200"
          fill="#b13c3c"></polygon>

        <polygon class="country-shape" id="france" points="180,260 270,220 350,250 340,340 250,370 170,330"
          fill="#3f5fb8"></polygon>

        <polygon class="country-shape" id="spain" points="110,360 210,350 260,390 230,470 120,480 80,420"
          fill="#a06b2b"></polygon>

        <polygon class="country-shape" id="germany" points="340,200 430,180 500,230 480,320 390,330 320,280"
          fill="#8a8a8a"></polygon>

        <polygon class="country-shape" id="italy" points="390,360 470,340 520,390 500,500 450,530 430,470 400,430"
          fill="#36854a"></polygon>

        <polygon class="country-shape" id="poland" points="500,220 590,210 650,250 620,330 530,320 490,270"
          fill="#c95b5b"></polygon>

        <polygon class="country-shape" id="ussr" points="650,140 860,120 880,300 820,420 650,400 610,260"
          fill="#7c2f2f"></polygon>

        <!-- Villes -->
        <circle class="city" cx="165" cy="175" r="7"></circle>
        <circle class="city" cx="255" cy="285" r="7"></circle>
        <circle class="city" cx="170" cy="415" r="7"></circle>
        <circle class="city" cx="405" cy="255" r="7"></circle>
        <circle class="city" cx="455" cy="410" r="7"></circle>
        <circle class="city" cx="565" cy="265" r="7"></circle>
        <circle class="city" cx="760" cy="220" r="7"></circle>

        <!-- Labels -->
        <text class="label" x="165" y="170">Londres</text>
        <text class="label" x="255" y="280">Paris</text>
        <text class="label" x="170" y="410">Madrid</text>
        <text class="label" x="405" y="250">Berlin</text>
        <text class="label" x="455" y="405">Rome</text>
        <text class="label" x="565" y="260">Varsovie</text>
        <text class="label" x="760" y="215">Moscou</text>
      </svg>
    </div>

    <div class="side-panel">
      <div class="panel-box">
        <h3>Situation</h3>
        <div class="country">🇩🇪 Allemagne</div>
        <div class="country">🇬🇧 Royaume-Uni</div>
        <div class="country">🇫🇷 France</div>
        <div class="country">🇷🇺 URSS</div>
        <div class="country">🇮🇹 Italie</div>
        <div class="country">🇪🇸 Espagne</div>
        <div class="country">🇵🇱 Pologne</div>
      </div>

      <div class="panel-box">
        <h3>Pays sélectionné</h3>
        <div id="selected-country">Aucun</div>
      </div>

      <div class="panel-box">
        <h3>Journal</h3>
        <div class="journal">
          1 Sept. 1939 — La guerre commence !<br />
          Cliquez sur un pays pour le sélectionner.
        </div>
      </div>
    </div>
  </div>

  <script>
    const names = {
      uk: "Royaume-Uni",
      france: "France",
      spain: "Espagne",
      germany: "Allemagne",
      italy: "Italie",
      poland: "Pologne",
      ussr: "URSS"
    };

    document.querySelectorAll(".country-shape").forEach(country => {
      country.addEventListener("click", () => {
        document.getElementById("selected-country").textContent = names[country.id];
      });
    });
  </script>
</body>
</html>
