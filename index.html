<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SUPREMACY 1942</title>
  <style>
    body {
      margin: 0;
      background: #050505;
      color: #f0d28a;
      font-family: Georgia, serif;
    }

    header {
      background: #0b0b0b;
      border-bottom: 2px solid #2a2a2a;
      padding: 16px;
    }

    h1 {
      margin: 0 0 12px 0;
      font-size: 42px;
      letter-spacing: 2px;
    }

    .topbar {
      display: flex;
      gap: 24px;
      font-size: 18px;
    }

    .layout {
      display: flex;
      min-height: calc(100vh - 110px);
    }

    .map-area {
      flex: 1;
      background: linear-gradient(#0c1d3a, #07111f);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow: auto;
    }

    .side-panel {
      width: 320px;
      background: #090909;
      border-left: 2px solid #2a2a2a;
      padding: 16px;
      box-sizing: border-box;
    }

    .panel-box {
      border: 1px solid #5a4720;
      padding: 14px;
      margin-bottom: 16px;
      background: rgba(0, 0, 0, 0.4);
    }

    .panel-box h2 {
      margin: 0 0 12px 0;
      font-size: 22px;
      color: #f0d28a;
    }

    .country-line {
      margin: 8px 0;
      font-size: 18px;
    }

    #selected-country {
      color: white;
      font-size: 22px;
      font-weight: bold;
    }

    #selected-info {
      margin-top: 10px;
      color: #ddd;
      line-height: 1.5;
    }

    svg {
      width: 100%;
      max-width: 900px;
      height: auto;
    }

    .sea {
      fill: #0b2347;
    }

    .country {
      stroke: #111;
      stroke-width: 3;
      cursor: pointer;
      transition: 0.2s;
    }

    .country:hover {
      filter: brightness(1.15);
      stroke: #f0d28a;
    }

    .country.selected {
      stroke: #ffffff;
      stroke-width: 4;
      filter: brightness(1.2);
    }

    .city {
      fill: #f0d28a;
      stroke: #111;
      stroke-width: 2;
      pointer-events: none;
    }

    .label {
      fill: white;
      font-size: 20px;
      font-weight: bold;
      text-anchor: middle;
      pointer-events: none;
    }

    .small-label {
      fill: #f0d28a;
      font-size: 14px;
      text-anchor: middle;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>SUPREMACY 1942</h1>
    <div class="topbar">
      <div>⚙️ 90</div>
      <div>⛽ 70</div>
      <div>🌾 80</div>
      <div>💰 600</div>
    </div>
  </header>

  <div class="layout">
    <div class="map-area">
      <svg viewBox="0 0 1000 700" aria-label="Carte de l'Europe">
        <rect class="sea" x="0" y="0" width="1000" height="700"></rect>

        <!-- Royaume-Uni -->
        <polygon id="uk" class="country" fill="#9b2f2f"
          points="135,135 185,110 225,145 220,220 180,255 125,230 110,175"></polygon>

        <!-- Espagne -->
        <polygon id="spain" class="country" fill="#9c6b2f"
          points="90,430 200,410 265,445 250,530 130,550 65,500"></polygon>

        <!-- France -->
        <polygon id="france" class="country" fill="#3d57b8"
          points="180,290 285,245 375,275 360,380 255,410 165,365"></polygon>

        <!-- Allemagne -->
        <polygon id="germany" class="country" fill="#727272"
          points="375,230 475,215 545,275 525,370 430,385 355,320"></polygon>

        <!-- Italie -->
        <polygon id="italy" class="country" fill="#2d7e41"
          points="410,420 505,390 560,440 545,580 500,615 470,560 425,500"></polygon>

        <!-- Pologne -->
        <polygon id="poland" class="country" fill="#b44a4a"
          points="545,245 655,230 720,275 690,370 585,360 530,300"></polygon>

        <!-- URSS -->
        <polygon id="ussr" class="country" fill="#7a2626"
          points="710,130 965,105 980,330 920,500 720,470 680,280"></polygon>

        <!-- villes -->
        <circle class="city" cx="170" cy="185" r="8"></circle>
        <circle class="city" cx="235" cy="323" r="8"></circle>
        <circle class="city" cx="160" cy="480" r="8"></circle>
        <circle class="city" cx="450" cy="295" r="8"></circle>
        <circle class="city" cx="505" cy="470" r="8"></circle>
        <circle class="city" cx="620" cy="295" r="8"></circle>
        <circle class="city" cx="845" cy="220" r="8"></circle>

        <!-- labels -->
        <text class="label" x="170" y="175">Londres</text>
        <text class="label" x="235" y="315">Paris</text>
        <text class="label" x="160" y="472">Madrid</text>
        <text class="label" x="450" y="287">Berlin</text>
        <text class="label" x="505" y="462">Rome</text>
        <text class="label" x="620" y="287">Varsovie</text>
        <text class="label" x="845" y="212">Moscou</text>

        <text class="small-label" x="450" y="325">Allemagne</text>
        <text class="small-label" x="235" y="353">France</text>
        <text class="small-label" x="620" y="325">Pologne</text>
      </svg>
    </div>

    <div class="side-panel">
      <div class="panel-box">
        <h2>Situation</h2>
        <div class="country-line">🇩🇪 Allemagne</div>
        <div class="country-line">🇬🇧 Royaume-Uni</div>
        <div class="country-line">🇫🇷 France</div>
        <div class="country-line">🇷🇺 URSS</div>
        <div class="country-line">🇮🇹 Italie</div>
        <div class="country-line">🇪🇸 Espagne</div>
        <div class="country-line">🇵🇱 Pologne</div>
      </div>

      <div class="panel-box">
        <h2>Pays sélectionné</h2>
        <div id="selected-country">Aucun</div>
        <div id="selected-info">Clique sur un pays de la carte.</div>
      </div>

      <div class="panel-box">
        <h2>Journal</h2>
        <div>1 Sept. 1939 — La guerre commence !</div>
      </div>
    </div>
  </div>

  <script>
    const data = {
      uk: {
        name: "Royaume-Uni",
        info: "Capitale : Londres<br>Ressource : argent<br>Unités : 4 divisions"
      },
      france: {
        name: "France",
        info: "Capitale : Paris<br>Ressource : nourriture<br>Unités : 5 divisions"
      },
      spain: {
        name: "Espagne",
        info: "Capitale : Madrid<br>Ressource : nourriture<br>Unités : 2 divisions"
      },
      germany: {
        name: "Allemagne",
        info: "Capitale : Berlin<br>Ressource : industrie<br>Unités : 9 divisions"
      },
      italy: {
        name: "Italie",
        info: "Capitale : Rome<br>Ressource : argent<br>Unités : 10 divisions"
      },
      poland: {
        name: "Pologne",
        info: "Capitale : Varsovie<br>Ressource : nourriture<br>Unités : 1 division"
      },
      ussr: {
        name: "URSS",
        info: "Capitale : Moscou<br>Ressource : pétrole<br>Unités : 9 divisions"
      }
    };

    const countries = document.querySelectorAll(".country");
    const selectedCountry = document.getElementById("selected-country");
    const selectedInfo = document.getElementById("selected-info");

    countries.forEach(country => {
      country.addEventListener("click", () => {
        countries.forEach(c => c.classList.remove("selected"));
        country.classList.add("selected");

        const id = country.id;
        selectedCountry.textContent = data[id].name;
        selectedInfo.innerHTML = data[id].info;
      });
    });
  </script>
</body>
</html>
